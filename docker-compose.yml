services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventbooking
      POSTGRES_PASSWORD: eventbooking
      POSTGRES_DB: eventbooking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventbooking -d eventbooking"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
